repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix

  - repo: local
    hooks:
      - id: markdown-table-formatter
        name: markdown-table-formatter (align columns)
        entry: npx markdown-table-formatter
        language: system
        types: [markdown]
